name = "amiibo-game-list"
main = "src/index.ts"
compatibility_date = "2025-05-15"
compatibility_flags = ["nodejs_compat"]

# Weekly cron — Mondays at 04:00 UTC. Adjust as needed.
[triggers]
crons = ["0 4 * * 1"]

# ------------------------------------------------------------------
# Bindings — only R2 is required. Create with:
#   wrangler r2 bucket create amiibo-game-list
# ------------------------------------------------------------------

[[r2_buckets]]
binding = "OUTPUT_BUCKET"
bucket_name = "amiibo-game-list"

# ------------------------------------------------------------------
# Public vars (non-secret). Override per-environment as needed.
# ------------------------------------------------------------------

[vars]
ENABLE_GITHUB_COMMIT = "false"
GITHUB_OWNER = ""
GITHUB_REPO = ""
GITHUB_BRANCH = "main"
GITHUB_PATH = "games_info.json"
GITHUB_COMMIT_MESSAGE = "chore: refresh games_info.json"
GITHUB_COMMITTER_NAME = "amiibo-game-list-bot"
GITHUB_COMMITTER_EMAIL = "bot@example.invalid"
PARALLELISM = "8"

# ------------------------------------------------------------------
# Secrets — set with `wrangler secret put <name>`.
# ------------------------------------------------------------------
#   GITHUB_TOKEN          PAT (contents:write) for the target repo
#   INTERNAL_TRIGGER_KEY  shared secret for manual POST /trigger calls
# ------------------------------------------------------------------
